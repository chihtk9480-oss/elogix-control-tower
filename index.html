<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elogix Shield - V8.4 Realtime</title>
    <style>
        /* GIAO DIỆN HACKER V7 */
        body { 
            background-color: #050505; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }
        .hidden { display: none !important; }
        .btn { 
            background: rgba(0, 255, 0, 0.1); 
            color: #00ff00; 
            border: 1px solid #00ff00; 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px; 
            text-transform: uppercase;
            box-shadow: 0 0 10px #00ff00;
            transition: 0.3s;
        }
        .btn:hover { background: #00ff00; color: #000; }
        
        /* Giao diện Host */
        #host-dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }
        .player-card { 
            border: 1px solid #00ff00; 
            padding: 20px; 
            background: #0a0a0a; 
            text-align: left;
            position: relative;
        }
        .player-card h3 { margin-top: 0; border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        .status-live { 
            color: #00ff00; 
            font-weight: bold; 
            animation: blink 1s infinite; 
            float: right;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Giao diện Người chơi */
        #game-area {
            border: 1px solid #00ff00;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            background: #111;
        }
        .progress-bar {
            width: 100%;
            background: #222;
            height: 20px;
            margin: 15px 0;
            border: 1px solid #00ff00;
        }
        .progress-fill {
            height: 100%;
            background: #00ff00;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // Xử lý URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        const room = urlParams.get('room') || 'default_room';
        
        // Tạo ID ngẫu nhiên cho người chơi (Thí sinh)
        let clientId = localStorage.getItem('elogix_client_id');
        if (!clientId) {
            clientId = 'NXT_' + Math.floor(Math.random() * 9000 + 1000);
            localStorage.setItem('elogix_client_id', clientId);
        }

        // Cấu hình Kênh Realtime (Sử dụng ntfy.sh làm trạm trung chuyển tín hiệu)
        const ntfyTopic = `elogix_v84_room_${room}`;
        const ntfyUrl = `https://ntfy.sh/${ntfyTopic}`;
        const appDiv = document.getElementById('app');

        // ==========================================
        // 🖥️ LOGIC DÀNH CHO HOST (MÁY CHIẾU)
        // ==========================================
        if (role === 'host') {
            appDiv.innerHTML = `
                <h1>🛡️ ELOGIX CONTROL TOWER - HOST</h1>
                <h3>[ SERVER RANKING ] - Phòng: <span style="color:white">${room}</span></h3>
                <p>Hệ thống đang tự động theo dõi màn hình của người chơi trong phòng...</p>
                <div id="host-dashboard"></div>
            `;
            
            const dashboard = document.getElementById('host-dashboard');
            let playersData = {};

            // Lắng nghe tín hiệu Realtime qua SSE (Server-Sent Events)
            const eventSource = new EventSource(`${ntfyUrl}/sse`);
            eventSource.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.message) {
                    try {
                        const payload = JSON.parse(data.message);
                        if (payload.type === 'state_update') {
                            playersData[payload.clientId] = payload.state;
                            playersData[payload.clientId].lastSeen = Date.now();
                            renderDashboard();
                        }
                    } catch (err) {
                        console.log("Lỗi parse data:", err);
                    }
                }
            };

            // Hàm vẽ giao diện Host Realtime
            function renderDashboard() {
                dashboard.innerHTML = '';
                const now = Date.now();
                
                // Sắp xếp người chơi (Luật: Tiến độ cao nhất / Nhanh nhất thắng)
                const sortedPlayers = Object.entries(playersData).sort((a, b) => {
                    if (b[1].level !== a[1].level) return b[1].level - a[1].level; // Tầng cao hơn lên trước
                    return b[1].progress - a[1].progress; // Nếu cùng tầng, % cao hơn lên trước
                });

                for (const [id, state] of sortedPlayers) {
                    // Nếu mất tín hiệu quá 10 giây -> báo Offline
                    const isOffline = (now - state.lastSeen) > 10000; 
                    
                    dashboard.innerHTML += `
                        <div class="player-card" style="opacity: ${isOffline ? 0.5 : 1}">
                            <h3>Thí sinh: ${id} <span class="${isOffline ? '' : 'status-live'}">${isOffline ? '[Mất tín hiệu]' : '• LIVE'}</span></h3>
                            <p>> Tầng hiện tại: <span style="color:white">[ TẦNG ${state.level} ]</span></p>
                            <p>> Tiến độ giải mã: <span style="color:white">${state.progress}%</span></p>
                            ${state.level >= 5 ? `<p>> IP Đích (Tầng 5): <span style="color:yellow">${state.ip}</span></p>` : ''}
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${state.progress}%"></div>
                            </div>
                        </div>
                    `;
                }
            }

            // Dọn dẹp người chơi offline (Sau 15 giây không có tín hiệu sẽ xóa khỏi màn hình)
            setInterval(() => {
                const now = Date.now();
                let changed = false;
                for (const id in playersData) {
                    if (now - playersData[id].lastSeen > 15000) {
                        delete playersData[id];
                        changed = true;
                    }
                }
                if (changed) renderDashboard();
            }, 5000);

        } 
        // ==========================================
        // 📱 LOGIC DÀNH CHO NGƯỜI CHƠI
        // ==========================================
        else {
            appDiv.innerHTML = `
                <h1>ELOGIX SHIELD</h1>
                <p>Terminal: ${clientId} | Mạng: ${room}</p>
                <div id="pre-game">
                    <button id="start-btn" class="btn">KÍCH HOẠT HỆ THỐNG MẠNG</button>
                </div>
                
                <div id="game-area" class="hidden">
                    <h2 style="color: #00ff00; animation: blink 1s infinite;">>> ĐANG TRONG TRẬN...</h2>
                    <p>Đang bẻ khóa: <strong>[ TẦNG <span id="ui-level">1</span> ]</strong></p>
                    <p>Tiến độ: <span id="ui-progress">0</span>%</p>
                    
                    <div class="progress-bar">
                        <div id="ui-progress-bar" class="progress-fill"></div>
                    </div>
                    
                    <p id="ip-display" class="hidden" style="color:yellow; font-weight:bold;"></p>

                    <!-- Nút này để test luật game (Bạn thay bằng logic trả lời câu hỏi của bạn) -->
                    <button class="btn" id="play-btn" style="padding: 10px 20px; font-size: 14px;">Giải mã (+10%)</button>
                </div>
            `;

            let gameState = { level: 1, ip: 'Đang dò...', progress: 0 };
            let syncInterval;

            // Hàm bắn tín hiệu về Host
            function syncToHost() {
                fetch(ntfyUrl, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'state_update',
                        clientId: clientId,
                        state: gameState
                    })
                }).catch(e => console.log("Lỗi mạng: ", e));
            }

            // Khi người chơi bấm KÍCH HOẠT
            document.getElementById('start-btn').addEventListener('click', () => {
                document.getElementById('pre-game').classList.add('hidden');
                document.getElementById('game-area').classList.remove('hidden');
                
                // Bắn tín hiệu ngay lập tức và duy trì bắn mỗi 2 giây
                syncToHost();
                syncInterval = setInterval(syncToHost, 2000);
            });

            // LOGIC GAME GIẢ LẬP (Thay thế bằng file game gốc của bạn vào đây)
            // Luật 100% -> Lên Tầng, Tầng 5 -> Lộ IP
            document.getElementById('play-btn').addEventListener('click', () => {
                gameState.progress += 10;
                
                if (gameState.progress >= 100) {
                    gameState.level++;
                    gameState.progress = 0;
                    
                    // Nếu đến tầng 5, random ra IP
                    if (gameState.level === 5) {
                        gameState.ip = '192.168.1.' + Math.floor(Math.random() * 255);
                        const ipEl = document.getElementById('ip-display');
                        ipEl.innerText = '>> ĐÃ TÌM THẤY IP: ' + gameState.ip;
                        ipEl.classList.remove('hidden');
                    }
                }

                // Cập nhật giao diện điện thoại người chơi
                document.getElementById('ui-level').innerText = gameState.level;
                document.getElementById('ui-progress').innerText = gameState.progress;
                document.getElementById('ui-progress-bar').style.width = gameState.progress + '%';
                
                // Ép bắn tín hiệu ngay lập tức khi có thay đổi (Nhanh nhất thắng)
                syncToHost(); 
            });
        }
    </script>
</body>
</html>
