<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elogix Shield - V8.5 Realtime Mirror</title>
    <style>
        /* GIAO DIỆN CHUNG */
        body { 
            background-color: #050505; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }
        .hidden { display: none !important; }
        .btn { 
            background: rgba(0, 255, 0, 0.1); 
            color: #00ff00; 
            border: 1px solid #00ff00; 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px; 
            text-transform: uppercase;
            box-shadow: 0 0 10px #00ff00;
            transition: 0.3s;
        }
        .btn:hover { background: #00ff00; color: #000; }
        
        /* GIAO DIỆN HOST */
        #host-dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
            margin-top: 30px; 
        }
        .player-card { 
            border: 1px solid #555; 
            padding: 15px; 
            background: #0a0a0a; 
            text-align: left;
            position: relative;
            box-shadow: inset 0 0 10px #000;
        }
        .player-card h3 { 
            margin-top: 0; 
            border-bottom: 1px dashed #555; 
            padding-bottom: 10px; 
            font-size: 16px;
            color: #fff;
        }
        .status-live { 
            color: #00ff00; 
            font-weight: bold; 
            animation: blink 1s infinite; 
            float: right;
            background: rgba(0,255,0,0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* KHUNG NHÂN BẢN MÀN HÌNH NGƯỜI CHƠI TRÊN HOST */
        .mini-screen {
            border: 2px solid #00ff00;
            padding: 15px;
            background: #111;
            margin-top: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            position: relative;
        }
        .mini-screen::before {
            content: "LIVE VIEW";
            position: absolute;
            top: -10px;
            left: 10px;
            background: #050505;
            padding: 0 5px;
            font-size: 12px;
            color: #00ff00;
        }

        /* GIAO DIỆN NGƯỜI CHƠI */
        #game-area {
            border: 2px solid #00ff00;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            background: #111;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .progress-bar {
            width: 100%;
            background: #222;
            height: 20px;
            margin: 15px 0;
            border: 1px solid #00ff00;
        }
        .progress-fill {
            height: 100%;
            background: #00ff00;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // Xử lý URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        const room = urlParams.get('room') || 'default_room';
        
        // Tạo ID ngẫu nhiên cho người chơi
        let clientId = localStorage.getItem('elogix_client_id');
        if (!clientId) {
            clientId = 'NXT_' + Math.floor(Math.random() * 9000 + 1000);
            localStorage.setItem('elogix_client_id', clientId);
        }

        // Cấu hình Kênh Realtime
        const ntfyTopic = `elogix_v85_room_${room}`;
        const ntfyUrl = `https://ntfy.sh/${ntfyTopic}`;
        const appDiv = document.getElementById('app');

        // ==========================================
        // 🖥️ LOGIC DÀNH CHO HOST (MÁY CHIẾU)
        // ==========================================
        if (role === 'host') {
            appDiv.innerHTML = `
                <h1>🛡️ ELOGIX CONTROL TOWER - HOST OVERVIEW</h1>
                <h3>[ SERVER RANKING ] - Mạng cục bộ: <span style="color:white">${room}</span></h3>
                <p>Hệ thống đang nhân bản trực tiếp màn hình của thí sinh...</p>
                <div id="host-dashboard"></div>
            `;
            
            const dashboard = document.getElementById('host-dashboard');
            let playersData = {};

            const eventSource = new EventSource(`${ntfyUrl}/sse`);
            eventSource.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.message) {
                    try {
                        const payload = JSON.parse(data.message);
                        if (payload.type === 'state_update') {
                            playersData[payload.clientId] = payload.state;
                            playersData[payload.clientId].lastSeen = Date.now();
                            renderDashboard();
                        }
                    } catch (err) {
                        console.log("Lỗi parse data:", err);
                    }
                }
            };

            function renderDashboard() {
                dashboard.innerHTML = '';
                const now = Date.now();
                
                const sortedPlayers = Object.entries(playersData).sort((a, b) => {
                    if (b[1].level !== a[1].level) return b[1].level - a[1].level; 
                    return b[1].progress - a[1].progress; 
                });

                for (const [id, state] of sortedPlayers) {
                    const isOffline = (now - state.lastSeen) > 10000; 
                    
                    // Vẽ lại MÀN HÌNH THU NHỎ giống hệt giao diện game của người chơi
                    dashboard.innerHTML += `
                        <div class="player-card" style="opacity: ${isOffline ? 0.4 : 1}">
                            <h3>ID: ${id} <span class="${isOffline ? '' : 'status-live'}">${isOffline ? '[Mất kết nối]' : '• LIVE TRỰC TIẾP'}</span></h3>
                            
                            <div class="mini-screen">
                                <h4 style="color: #00ff00; animation: ${isOffline ? 'none' : 'blink 1s infinite'}; margin-top: 0;">
                                    >> ${isOffline ? 'TẠM DỪNG...' : 'ĐANG TRONG TRẬN...'}
                                </h4>
                                <p style="font-size: 14px; margin: 5px 0;">Đang bẻ khóa: <strong>[ TẦNG <span style="color:white; font-size: 16px;">${state.level}</span> ]</strong></p>
                                <p style="font-size: 14px; margin: 5px 0;">Tiến độ: <span style="color:white; font-size: 16px;">${state.progress}</span>%</p>
                                
                                <div class="progress-bar" style="height: 12px; margin: 10px 0;">
                                    <div class="progress-fill" style="width: ${state.progress}%"></div>
                                </div>
                                
                                ${state.level >= 5 
                                    ? `<p style="color:yellow; font-weight:bold; margin-bottom:0; font-size: 15px;">>> ĐÃ TÌM THẤY IP: ${state.ip}</p>` 
                                    : `<p style="color:#444; margin-bottom:0; font-size: 12px;">[IP Đang được bảo mật]</p>`}
                            </div>
                            </div>
                    `;
                }
            }

            setInterval(() => {
                const now = Date.now();
                let changed = false;
                for (const id in playersData) {
                    if (now - playersData[id].lastSeen > 15000) {
                        delete playersData[id];
                        changed = true;
                    }
                }
                if (changed) renderDashboard();
            }, 5000);

        } 
        // ==========================================
        // 📱 LOGIC DÀNH CHO NGƯỜI CHƠI
        // ==========================================
        else {
            appDiv.innerHTML = `
                <h1>ELOGIX SHIELD</h1>
                <p>Terminal: ${clientId} | Mạng: ${room}</p>
                <div id="pre-game">
                    <button id="start-btn" class="btn">KÍCH HOẠT HỆ THỐNG MẠNG</button>
                </div>
                
                <div id="game-area" class="hidden">
                    <h2 style="color: #00ff00; animation: blink 1s infinite; margin-top: 0;">>> ĐANG TRONG TRẬN...</h2>
                    <p>Đang bẻ khóa: <strong>[ TẦNG <span id="ui-level" style="color:white; font-size:20px;">1</span> ]</strong></p>
                    <p>Tiến độ: <span id="ui-progress" style="color:white; font-size:20px;">0</span>%</p>
                    
                    <div class="progress-bar">
                        <div id="ui-progress-bar" class="progress-fill"></div>
                    </div>
                    
                    <p id="ip-display" class="hidden" style="color:yellow; font-weight:bold; font-size: 18px;"></p>

                    <button class="btn" id="play-btn" style="padding: 10px 20px; font-size: 14px;">Giải mã (+10%)</button>
                </div>
            `;

            let gameState = { level: 1, ip: 'Đang dò...', progress: 0 };
            let syncInterval;

            function syncToHost() {
                fetch(ntfyUrl, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'state_update',
                        clientId: clientId,
                        state: gameState
                    })
                }).catch(e => console.log("Lỗi mạng: ", e));
            }

            document.getElementById('start-btn').addEventListener('click', () => {
                document.getElementById('pre-game').classList.add('hidden');
                document.getElementById('game-area').classList.remove('hidden');
                
                syncToHost();
                syncInterval = setInterval(syncToHost, 1500); // Tăng tốc độ báo cáo để mượt hơn
            });

            document.getElementById('play-btn').addEventListener('click', () => {
                gameState.progress += 10;
                
                if (gameState.progress >= 100) {
                    gameState.level++;
                    gameState.progress = 0;
                    
                    if (gameState.level === 5) {
                        gameState.ip = '192.168.1.' + Math.floor(Math.random() * 255);
                        const ipEl = document.getElementById('ip-display');
                        ipEl.innerText = '>> ĐÃ TÌM THẤY IP: ' + gameState.ip;
                        ipEl.classList.remove('hidden');
                    }
                }

                document.getElementById('ui-level').innerText = gameState.level;
                document.getElementById('ui-progress').innerText = gameState.progress;
                document.getElementById('ui-progress-bar').style.width = gameState.progress + '%';
                
                syncToHost(); 
            });
        }
    </script>
</body>
</html>
