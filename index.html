<!-- V12.2 HOST LIVE SHADOW SCREEN PATCH
Dán toàn bộ khối này ngay TRƯỚC thẻ </body> trong file HTML hiện tại.
Mục tiêu: host nhìn như màn hình người chơi realtime trên điện thoại, nhưng không dùng quay màn hình nặng.
-->
<script>
(function(){
    if (window.__ELOGIX_LIVE_SHADOW_PATCH_V122__) return;
    window.__ELOGIX_LIVE_SHADOW_PATCH_V122__ = true;

    function injectShadowCss(){
        if (document.getElementById('elogix-shadow-live-css')) return;
        const css = document.createElement('style');
        css.id = 'elogix-shadow-live-css';
        css.textContent = `
        /* V12.2: chống đè chữ + tối ưu mobile */
        * { box-sizing: border-box; }
        .grid-item, .mirror-item, .btn, .terminal-text, .host-team-stage {
            overflow-wrap: anywhere !important;
            word-break: break-word !important;
        }
        @media (max-width: 640px) {
            html, body { width:100%; max-width:100%; overflow-x:hidden; }
            body { padding:8px !important; align-items:flex-start !important; min-height:100dvh !important; }
            .game-wrapper {
                width:100% !important;
                max-width:100% !important;
                padding:18px 12px !important;
                border-radius:18px !important;
            }
            h1 { font-size:clamp(1.35rem, 8vw, 2rem) !important; line-height:1.08 !important; letter-spacing:.8px !important; }
            h2 { font-size:clamp(1.12rem, 6vw, 1.55rem) !important; line-height:1.15 !important; }
            .status-bar { flex-wrap:wrap !important; gap:8px !important; padding:10px 12px !important; font-size:.88rem !important; }
            .terminal-text { font-size:.94rem !important; line-height:1.45 !important; text-align:left !important; padding:14px !important; }
            .grid-container { grid-template-columns:repeat(2,minmax(0,1fr)) !important; gap:10px !important; }
            .grid-item { min-height:54px !important; padding:14px 8px !important; font-size:clamp(.78rem, 3.5vw, .98rem) !important; }
            .btn { padding:14px 12px !important; font-size:1rem !important; }
            .host-split-layout { flex-direction:column !important; gap:16px !important; }
            .host-left-side { grid-template-columns:1fr !important; }
            .host-right-side { padding:14px !important; }
        }

        /* V12.2: khung host dựng lại màn hình người chơi */
        .shadow-live-shell {
            width:100%;
            min-height:610px;
            display:flex;
            flex-direction:column;
            gap:14px;
        }
        .shadow-live-top {
            display:flex;
            justify-content:space-between;
            gap:10px;
            flex-wrap:wrap;
            align-items:center;
            padding:12px 14px;
            border-radius:16px;
            border:1px solid rgba(0,255,102,.45);
            background:linear-gradient(135deg, rgba(0,255,102,.10), rgba(0,210,255,.08));
            box-shadow:0 0 24px rgba(0,255,102,.12);
            font-weight:1000;
            letter-spacing:.7px;
        }
        .shadow-live-badge { color:#00ff66; text-shadow:0 0 12px rgba(0,255,102,.65); }
        .shadow-phone-frame {
            width:min(390px, 100%);
            margin:0 auto;
            min-height:580px;
            border-radius:34px;
            border:5px solid rgba(15,23,42,.95);
            background:#020308;
            padding:14px;
            box-shadow:0 0 42px rgba(0,210,255,.25), inset 0 0 22px rgba(0,0,0,.95);
            position:relative;
            overflow:hidden;
        }
        .shadow-phone-frame::before {
            content:"";
            position:absolute;
            top:8px;
            left:50%;
            transform:translateX(-50%);
            width:96px;
            height:16px;
            border-radius:0 0 14px 14px;
            background:#050816;
            z-index:2;
        }
        .shadow-phone-screen {
            min-height:548px;
            border-radius:24px;
            padding:28px 14px 16px;
            background:
                radial-gradient(circle at top left, rgba(0,210,255,.12), transparent 35%),
                radial-gradient(circle at bottom right, rgba(176,38,255,.14), transparent 38%),
                linear-gradient(180deg, #020614, #050816);
            border:1px solid rgba(0,210,255,.24);
            overflow:hidden;
        }
        .shadow-player-title {
            color:#00d2ff;
            text-align:center;
            font-weight:1000;
            font-size:1.14rem;
            line-height:1.16;
            text-shadow:0 0 14px rgba(0,210,255,.55);
            margin:0 0 12px;
            overflow-wrap:anywhere;
        }
        .shadow-player-stage {
            display:flex;
            justify-content:space-between;
            gap:8px;
            flex-wrap:wrap;
            background:rgba(3,5,15,.86);
            border-left:4px solid #00d2ff;
            border-radius:10px;
            padding:9px 10px;
            font-size:.82rem;
            font-weight:900;
            margin-bottom:12px;
        }
        .shadow-live-clock { color:#00ff66; text-shadow:0 0 10px rgba(0,255,102,.55); }
        .shadow-live-hp { color:#f8fafc; }
        .shadow-terminal {
            background:#03050f;
            border-left:5px solid #b026ff;
            border-radius:12px;
            padding:13px;
            color:#dbeafe;
            font-size:.9rem;
            line-height:1.45;
            margin-bottom:12px;
            overflow-wrap:anywhere;
        }
        .shadow-grid {
            display:grid;
            grid-template-columns:repeat(2,minmax(0,1fr));
            gap:9px;
            margin:10px 0;
        }
        .shadow-item {
            min-height:48px;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            border-radius:11px;
            border:1px solid rgba(34,45,99,.95);
            background:rgba(13,20,52,.62);
            color:#e2e8f0;
            padding:10px 7px;
            font-size:.82rem;
            font-weight:900;
            overflow-wrap:anywhere;
            word-break:break-word;
        }
        .shadow-item.clean, .shadow-item.selected-clean {
            color:#00ff66;
            border-color:#00ff66;
            background:rgba(0,255,102,.13);
            box-shadow:0 0 15px rgba(0,255,102,.22);
        }
        .shadow-item.bad, .shadow-item.selected-malware {
            color:#ff557a;
            border-color:#ff0044;
            background:rgba(255,0,68,.13);
            box-shadow:0 0 15px rgba(255,0,68,.20);
        }
        .shadow-buttons { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
        .shadow-btn {
            border-radius:12px;
            border:1px solid rgba(0,210,255,.35);
            background:rgba(16,22,56,.68);
            color:#e2e8f0;
            padding:11px;
            font-weight:1000;
            text-align:center;
            font-size:.86rem;
            overflow-wrap:anywhere;
        }
        .shadow-btn.action {
            background:linear-gradient(135deg, #b026ff, #4900c2);
            border-color:transparent;
            color:white;
            box-shadow:0 0 18px rgba(176,38,255,.45);
        }
        .shadow-progress {
            height:10px;
            border-radius:999px;
            background:#03050f;
            border:1px solid rgba(0,210,255,.22);
            overflow:hidden;
            margin:10px 0 2px;
        }
        .shadow-progress span {
            display:block;
            height:100%;
            width:0%;
            background:linear-gradient(90deg, #00ff66, #00d2ff);
            box-shadow:0 0 12px rgba(0,255,102,.55);
            transition:width .2s linear;
        }
        .shadow-waiting {
            margin:auto;
            text-align:center;
            color:#94a3b8;
            line-height:1.6;
            padding:32px 14px;
            font-weight:800;
        }
        `;
        document.head.appendChild(css);
    }

    injectShadowCss();

    function safeText(el, max){
        if (!el) return '';
        return String(el.textContent || '').replace(/\s+/g,' ').trim().slice(0, max || 260);
    }

    function buildLiveMiniMirror(){
        try {
            const active = document.querySelector('.view.active:not(#view-host)') || document.querySelector('.view.active');
            if (!active) return null;

            const titleEl = active.querySelector('h1,h2,.mission-title,.title') || document.querySelector('h1,h2');
            const terminalEl = active.querySelector('.terminal-text,.mission-subtitle,.result-summary,.result-text');
            const statusEl = active.querySelector('.status-bar');
            const progressEl = active.querySelector('.progress-fill');

            const items = Array.from(active.querySelectorAll('.grid-item,.mirror-item,.incoterm-btn,.option,.choice'))
                .slice(0, 12)
                .map((el, idx) => ({
                    text: safeText(el, 90),
                    cls: String(el.className || ''),
                    index: idx
                }))
                .filter(x => x.text);

            const buttons = Array.from(active.querySelectorAll('button,.btn'))
                .slice(0, 6)
                .map(el => ({
                    text: safeText(el, 80),
                    action: String(el.className || '').includes('btn-action')
                }))
                .filter(x => x.text);

            let progress = 0;
            if (progressEl) {
                const w = progressEl.style.width || getComputedStyle(progressEl).width || '0';
                if (String(w).includes('%')) progress = parseFloat(w) || 0;
            }
            if (!progress && typeof stageLabels !== 'undefined') {
                const order = ['login','c1','c2','c3','c4','c5','win'];
                const idx = order.indexOf(window.currentStageCode || 'login');
                progress = Math.max(0, Math.min(100, Math.round((idx / 6) * 100)));
            }

            return {
                activeId: active.id || '',
                title: safeText(titleEl, 110) || (typeof teamName !== 'undefined' && teamName ? teamName : 'Đang chơi'),
                terminal: safeText(terminalEl, 380) || safeText(active, 380),
                status: safeText(statusEl, 140),
                items,
                buttons,
                progress,
                viewClass: String(active.className || ''),
                bodyClass: String(document.body.className || ''),
                capturedAt: Date.now()
            };
        } catch(e) {
            return null;
        }
    }

    function enrichPayloadWithLiveMirror(payload){
        try {
            if (typeof isHost !== 'undefined' && isHost) return payload;
            if (!payload || !payload.team) return payload;
            const mirror = buildLiveMiniMirror();
            payload.extra = Object.assign({}, payload.extra || {}, {
                liveMirror: mirror,
                liveMirrorMode: 'html-shadow-v12.2',
                liveMirrorAt: Date.now()
            });
        } catch(e) {}
        return payload;
    }

    /* Không đụng mạnh code cũ: chỉ bọc hàm gửi payload để mọi heartbeat đều kèm màn hình mini */
    if (typeof postRealtimePayload === 'function' && !window.__elogixOriginalPostRealtimePayload) {
        window.__elogixOriginalPostRealtimePayload = postRealtimePayload;
        postRealtimePayload = function(payload, options){
            return window.__elogixOriginalPostRealtimePayload(enrichPayloadWithLiveMirror(payload), options);
        };
    }

    function escHtml(s){
        return String(s == null ? '' : s)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;')
            .replace(/'/g,'&#39;');
    }

    function getLiveDisplaySeconds(payload){
        try {
            const code = payload.stageCode || '';
            if (code === 'win') return Number(payload.finalTime || payload.time || 0);
            if (payload.isPlaying && payload.startedAt) {
                return Math.max(0, Math.floor((Date.now() - Number(payload.startedAt)) / 1000));
            }
            return Number(payload.time || 0);
        } catch(e) {
            return Number(payload && payload.time || 0);
        }
    }

    function renderShadowMirror(payload){
        const viewport = document.getElementById('mirror-viewport');
        if (!viewport || !payload) return false;
        const mirror = payload.extra && payload.extra.liveMirror;
        if (!mirror) return false;

        const team = escHtml(payload.team || '');
        const stage = escHtml(payload.stage || 'Đang đồng bộ');
        const hp = Math.max(0, Math.min(100, Number(payload.hp ?? 100)));
        const sec = getLiveDisplaySeconds(payload);
        const progress = Math.max(0, Math.min(100, Number(mirror.progress || 0)));
        const isFinished = (payload.stageCode === 'win');
        const liveText = isFinished ? '🏁 ĐÃ HOÀN THÀNH' : (payload.isPlaying ? '🟢 ĐANG CHƠI LIVE' : '🟡 ONLINE');

        const items = Array.isArray(mirror.items) ? mirror.items : [];
        const buttons = Array.isArray(mirror.buttons) ? mirror.buttons : [];

        viewport.innerHTML = `
            <div class="shadow-live-shell" data-shadow-team="${team}">
                <div class="shadow-live-top">
                    <span class="shadow-live-badge">📱 LIVE MÀN HÌNH NGƯỜI CHƠI · NHÓM ${team}</span>
                    <span>${liveText}</span>
                </div>
                <div class="shadow-phone-frame">
                    <div class="shadow-phone-screen">
                        <div class="shadow-player-title">${escHtml(mirror.title || 'Đang chơi')}</div>
                        <div class="shadow-player-stage">
                            <span>${stage}</span>
                            <span class="shadow-live-clock" data-started-at="${Number(payload.startedAt || 0)}" data-final="${isFinished ? Number(payload.finalTime || payload.time || 0) : ''}">${sec}s</span>
                            <span class="shadow-live-hp">${hp}%</span>
                        </div>
                        ${mirror.status ? `<div class="shadow-terminal">${escHtml(mirror.status)}</div>` : ''}
                        <div class="shadow-terminal">${escHtml(mirror.terminal || 'Đang đồng bộ màn hình người chơi...')}</div>
                        <div class="shadow-progress"><span style="width:${progress}%"></span></div>
                        ${items.length ? `
                            <div class="shadow-grid">
                                ${items.map(it => {
                                    const cls = String(it.cls || '');
                                    const state = cls.includes('selected-clean') ? 'selected-clean clean' :
                                                  cls.includes('selected-malware') ? 'selected-malware bad' :
                                                  cls.includes('m-good') ? 'clean' :
                                                  cls.includes('m-bad') ? 'bad' : '';
                                    return `<div class="shadow-item ${state}">${escHtml(it.text)}</div>`;
                                }).join('')}
                            </div>
                        ` : `<div class="shadow-waiting">Đang chờ thao tác tiếp theo từ điện thoại...</div>`}
                        ${buttons.length ? `
                            <div class="shadow-buttons">
                                ${buttons.map(b => `<div class="shadow-btn ${b.action ? 'action' : ''}">${escHtml(b.text)}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            </div>
        `;

        const title = document.getElementById('spec-title');
        if (title) title.innerHTML = `📱 LIVE SHADOW SCREEN: NHÓM ${team}`;
        return true;
    }

    if (typeof mirrorPlayerScreen === 'function' && !window.__elogixOriginalMirrorPlayerScreen) {
        window.__elogixOriginalMirrorPlayerScreen = mirrorPlayerScreen;
        mirrorPlayerScreen = function(payload){
            if (renderShadowMirror(payload)) return;
            return window.__elogixOriginalMirrorPlayerScreen(payload);
        };
    }

    /* Đồng hồ trên host tự chạy, không chờ gói mạng mới từng giây */
    if (!window.__elogixShadowClockTimer) {
        window.__elogixShadowClockTimer = setInterval(function(){
            document.querySelectorAll('.shadow-live-clock').forEach(function(el){
                const finalVal = el.getAttribute('data-final');
                if (finalVal !== '') {
                    el.textContent = `${Number(finalVal || 0)}s`;
                    return;
                }
                const startedAt = Number(el.getAttribute('data-started-at') || 0);
                if (startedAt > 0) el.textContent = `${Math.max(0, Math.floor((Date.now() - startedAt) / 1000))}s`;
            });
        }, 250);
    }

    /* Đẩy thêm tín hiệu đều khi đang chơi, nhẹ hơn chụp canvas/video */
    if (typeof isHost !== 'undefined' && !isHost && !window.__elogixShadowPlayerTick) {
        window.__elogixShadowPlayerTick = setInterval(function(){
            try {
                if (!document.hidden && typeof teamId !== 'undefined' && teamId && typeof sendCurrentPlayerPayload === 'function') {
                    sendCurrentPlayerPayload('live-shadow-tick', false);
                }
            } catch(e) {
                try { if (typeof sendCurrentPlayerPayload === 'function') sendCurrentPlayerPayload(); } catch(_) {}
            }
        }, 900);
    }

    /* Bắn ngay khi người chơi bấm/chọn đáp án để host thấy gần như tức thời */
    if (typeof isHost !== 'undefined' && !isHost) {
        ['click','touchend','change','input'].forEach(function(ev){
            document.addEventListener(ev, function(){
                try {
                    if (typeof sendCurrentPlayerPayload === 'function') {
                        setTimeout(function(){ sendCurrentPlayerPayload('live-shadow-action', true); }, 60);
                    }
                } catch(e) {}
            }, { passive:true, capture:true });
        });
    }
})();
</script>
