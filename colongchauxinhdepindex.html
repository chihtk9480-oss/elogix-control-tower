<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>E-Logix Control Tower Multiplayer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tích hợp sẵn CDN Firebase không cần cài đặt Node.js -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0d0e15; --panel: #161925; --neon: #00ffcc; --pink: #ff0055; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .view-panel { display: none; width: 100%; max-width: 600px; background: var(--panel); border: 2px solid #23283d; border-radius: 12px; padding: 20px; box-sizing: border-box; text-align: center; }
        .timer { font-size: 3rem; color: var(--pink); margin: 10px 0; font-weight: bold; }
        .btn { background: #1f2336; color: white; border: 1px solid #3a4163; padding: 15px 20px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; }
        .btn:hover { border-color: var(--neon); }
        .btn-spin { background: var(--neon); color: var(--bg); box-shadow: 0 0 15px var(--neon); }
        .team-row { display: flex; justify-content: space-between; background: #1c2032; padding: 12px; margin-bottom: 8px; border-radius: 6px; }
        .target { background: #330816; border: 1px solid var(--pink); }
    </style>
</head>
<body>

    <!-- MÀN HÌNH HOÀN TOÀN TỰ ĐỘNG DỰA TRÊN ĐƯỜNG LINK URL -->
    
    <!-- 1. GIAO DIỆN HOST (VY MỞ TRÊN LAPTOP CHIẾU LÊN BẢNG) -->
    <div id="hostView" class="view-panel">
        <h2 style="color: var(--neon);">LIVE CONTROL TOWER DASHBOARD</h2>
        <button class="btn btn-spin" onclick="hostSpin()">PHÁT TÁN MÃ ĐỘC (SPIN)</button>
        <div class="timer" id="hostTimer">--</div>
        <div id="hostLog" style="margin: 15px 0; color: #8b9bb4;">Hệ thống đang trực chiến...</div>
        <h3>BẢNG ĐIỂM REALTIME</h3>
        <div id="hostLeaderboard"></div>
    </div>

    <!-- 2. GIAO DIỆN PLAYER (7 NHÓM DƯỚI LỚP QUÉT QR TRÊN ĐIỆN THOẠI) -->
    <div id="playerView" class="view-panel">
        <div id="setupZone">
            <h3>BẠN LÀ NHÓM CỔ ĐÔNG MẤY?</h3>
            <select id="teamSelect" class="btn" style="background: #1c2032;">
                <option value="1">Nhóm 1</option><option value="2">Nhóm 2</option>
                <option value="3">Nhóm 3</option><option value="4">Nhóm 4</option>
                <option value="5">Nhóm 5</option><option value="6">Nhóm 6</option>
                <option value="7">Nhóm 7</option>
            </select>
            <button class="btn btn-spin" onclick="joinGame()">VÀO PHÒNG TÁC CHIẾN</button>
        </div>

        <div id="gameZone" style="display: none;">
            <h2 id="playerTeamHeader" style="color: var(--neon);">NHÓM CỦA BẠN</h2>
            <div class="timer" id="playerTimer">--</div>
            <div id="playerStatus" style="margin-bottom: 20px;">Đang chờ lệnh từ hệ thống...</div>
            <div id="playerActions" style="display: none;">
                <button class="btn" style="color: #00ffcc; border-color: #00ffcc;" onclick="playerAction('cyber')">Cybersecurity (Gỡ bom)</button>
                <button class="btn" style="color: #ff9900; border-color: #ff9900;" onclick="playerAction('access')">Access Control (Đá bom)</button>
                <button class="btn" style="color: #ff0055; border-color: #ff0055;" onclick="playerAction('backup')">Cloud Backup (Cướp điểm)</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // DÁN CONFIG FIREBASE FREE CỦA BẠN VÀO ĐÂY ĐỂ CHẠY MULTIPLAYER
        // =========================================================
        const firebaseConfig = {
            apiKey: "DÁN_API_KEY_CỦA_BẠN_VÀO_ĐÂY",
            authDomain: "TÊN_APP_CỦA_BẠN.firebaseapp.com",
            databaseURL: "https://TÊN_APP_CỦA_BẠN-default-rtdb.firebaseio.com",
            projectId: "TÊN_APP_CỦA_BẠN",
            storageBucket: "TÊN_APP_CỦA_BẠN.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myTeamId = null;
        const urlParams = new URLSearchParams(window.location.search);
        const isHost = urlParams.get('role') === 'host';

        // Phân tuyến giao diện tự động dựa vào đường link URL
        if (isHost) {
            document.getElementById("hostView").style.display = "block";
            initHostDatabase();
        } else {
            document.getElementById("playerView").style.display = "block";
        }

        // Khởi tạo tầng đáy dữ liệu điểm số đồng bộ tự động lên Cloud
        function initHostDatabase() {
            db.ref("gameState").set({ targetTeam: 0, timer: "--", log: "Hệ thống sẵn sàng." });
            let startPoints = {};
            for(let i=1; i<=7; i++) startPoints[i] = 100;
            db.ref("scores").set(startPoints);
        }

        // Lắng nghe dữ liệu thay đổi realtime từ Cloud để cập nhật giao diện máy chiếu
        db.ref("scores").on("value", snapshot => {
            const scores = snapshot.val();
            if (!scores) return;
            let sorted = Object.keys(scores).map(key => ({id: key, score: scores[key]})).sort((a,b) => b.score - a.score);
            
            db.ref("gameState/targetTeam").once("value", targetSnap => {
                let target = targetSnap.val();
                if (isHost) {
                    let container = document.getElementById("hostLeaderboard");
                    container.innerHTML = sorted.map(t => `
                        <div class="team-row ${target == t.id ? 'target' : ''}">
                            <span>Nhóm cổ đông ${t.id}</span><span>${t.score}đ</span>
                        </div>
                    `).join("");
                }
            });
        });

        db.ref("gameState").on("value", snapshot => {
            const state = snapshot.val();
            if (!state) return;
            if (isHost) {
                document.getElementById("hostTimer").innerHTML = state.timer;
                document.getElementById("hostLog").innerHTML = state.log;
            } else if (myTeamId) {
                document.getElementById("playerTimer").innerHTML = state.timer;
                if (state.targetTeam == myTeamId && state.timer !== "--") {
                    document.getElementById("playerStatus").innerHTML = "⚠️ BẠN ĐANG BỊ HACKER KHÓA MỤC TIÊU! LẬT THẺ GẤP!";
                    document.getElementById("playerActions").style.display = "block";
                } else {
                    document.getElementById("playerStatus").innerHTML = state.log;
                    document.getElementById("playerActions").style.display = "none";
                }
            }
        });

        // Vy bấm nút quay số dính mã độc trên laptop
        function hostSpin() {
            let target = Math.floor(Math.random() * 7) + 1;
            db.ref("gameState").set({ targetTeam: target, timer: "5s", log: `⚠️ Mã độc NotPetya đã khóa mục tiêu vào Nhóm ${target}!` });
            
            let timeLeft = 5;
            let interval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    db.ref("gameState/timer").once("value", tSnap => {
                        if (tSnap.val() !== "--") {
                            db.ref(`scores/${target}`).once("value", sSnap => {
                                db.ref(`scores/${target}`).set(sSnap.val() - 40);
                                db.ref("gameState").set({ targetTeam: 0, timer: "--", log: `💥 BOOM! Nhóm ${target} dính bom NotPetya (-40đ)!` });
                            });
                        }
                    });
                } else {
                    db.ref("gameState/timer").set(timeLeft + "s");
                }
            }, 1000);
        }

        // Sinh viên chọn nhóm và bấm vào phòng thi từ điện thoại của họ
        function joinGame() {
            myTeamId = document.getElementById("teamSelect").value;
            document.getElementById("setupZone").style.display = "none";
            document.getElementById("gameZone").style.display = "block";
            document.getElementById("playerTeamHeader").innerHTML = `NHÓM CỔ ĐÔNG ${myTeamId}`;
        }

        // Sinh viên tự tay bấm lật thẻ gỡ bom / cướp điểm trên màn hình điện thoại
        function playerAction(type) {
            db.ref("gameState").set({ targetTeam: 0, timer: "--", log: "Đang xử lý lệnh phòng thủ..." });
            db.ref(`scores/${myTeamId}`).once("value", snapshot => {
                let currentScore = snapshot.val();
                if (type === 'cyber') {
                    db.ref("gameState").set({ targetTeam: 0, timer: "--", log: `🛡️ Nhóm ${myTeamId} lật Cybersecurity gỡ bom thành công!` });
                } else if (type === 'access') {
                    let victim = myTeamId == 7 ? 1 : parseInt(myTeamId) + 1; // Mặc định đá bom sang nhóm liền kề
                    db.ref(`scores/${victim}`).once("value", vSnap => {
                        db.ref(`scores/${victim}`).set(vSnap.val() - 40);
                        db.ref("gameState").set({ targetTeam: 0, timer: "--", log: `🎭 Nhóm ${myTeamId} lật Access Control, đá bom sang Nhóm ${victim} gánh hộ (-40đ)!` });
                    });
                } else if (type === 'backup') {
                    db.ref("scores").once("value", allScoresSnap => {
                        let allScores = allScoresSnap.val();
                        let topTeamId = Object.keys(allScores).reduce((a, b) => allScores[a] > allScores[b] ? a : b);
                        db.ref(`scores/${topTeamId}`).set(allScores[topTeamId] - 30);
                        db.ref(`scores/${myTeamId}`).set(currentScore + 30);
                        db.ref("gameState").set({ targetTeam: 0, timer: "--", log: `🚀 Cloud Backup! Nhóm ${myTeamId} cướp thẳng 30đ từ nhóm top 1 (Nhóm ${topTeamId})!` });
                    });
                }
            });
        }
    </script>
</body>
</html>
